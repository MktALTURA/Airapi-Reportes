<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Próximamente — Airapí Memorial Park</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #3f0d54;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 56px 48px;
      text-align: center;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 16px 48px rgba(63,13,84,0.3);
    }
    .logo-mark {
      width: 72px;
      height: 72px;
      background: #3f0d54;
      border-radius: 50%;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-mark svg { width: 40px; height: 40px; }
    .brand-name {
      font-size: 2rem;
      font-weight: 700;
      color: #3f0d54;
      letter-spacing: 0.04em;
    }
    .brand-sub {
      font-size: 0.8rem;
      color: #d8a30e;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-top: 4px;
    }
    .divider {
      width: 60px;
      height: 3px;
      background: #d8a30e;
      margin: 28px auto;
      border-radius: 2px;
    }
    .proxima {
      font-size: 1.5rem;
      font-weight: 600;
      color: #3f0d54;
      margin-bottom: 12px;
    }
    .desc {
      font-size: 0.92rem;
      color: #808080;
      line-height: 1.6;
    }
    .back {
      display: inline-block;
      margin-top: 36px;
      padding: 10px 28px;
      background: #3f0d54;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.88rem;
      transition: background 0.2s;
    }
    .back:hover { background: #6b2e8a; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-mark">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="20" cy="28" r="8" fill="#d8a30e" opacity="0.3"/>
        <path d="M20 24 Q16 20 12 22 Q16 18 20 14 Q24 18 28 22 Q24 20 20 24Z" fill="#d8a30e"/>
        <line x1="20" y1="12" x2="20" y2="6" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <line x1="14" y1="14" x2="11" y2="9" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <line x1="26" y1="14" x2="29" y2="9" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <line x1="11" y1="19" x2="6" y2="18" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <line x1="29" y1="19" x2="34" y2="18" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="brand-name">Airapí</div>
    <div class="brand-sub">Memorial Park · Tributo a la Vida</div>
    <div class="divider"></div>
    <div class="proxima">Próximamente</div>
    <p class="desc">Esta sección está en construcción.<br>Pronto estará disponible.</p>
    <a href="javascript:history.back()" class="back">← Regresar</a>
  </div>
</body>
</html>
